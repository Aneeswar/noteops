name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: notesops
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd app
          npm install

      - name: Run Lint
        run: |
          cd app
          npm run lint || echo "Lint skipped for demo"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Extract Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: |
            aneeswar/notes-app:latest
            aneeswar/notes-app:${{ steps.vars.outputs.sha_short }}

      - name: Update Config Repo
        run: |
          git config --global user.email "alluri.deepak69@gmail.com"
          git config --global user.name "Aneeswar"
          git clone https://${{ secrets.CONFIG_REPO_PAT }}@github.com/${{ github.repository_owner }}/notesops-config.git config-repo
          cd config-repo
          sed -i "s/tag: .*/tag: ${{ steps.vars.outputs.sha_short }}/" deploy/helm/values.yaml
          git add deploy/helm/values.yaml
          git commit -m "Update image tag to ${{ steps.vars.outputs.sha_short }}"
          git push
