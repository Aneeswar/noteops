name: CI Pipeline V2

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: cd app && npm install
      - name: Unit Tests & Coverage
        run: cd app && npm test

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract Git SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true
          tags: aneeswar/notes-app:${{ steps.vars.outputs.sha_short }}

      - name: Update Dev Overlay (Kustomize)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git clone https://${{ secrets.CONFIG_REPO_PAT }}@github.com/${{ github.repository_owner }}/notesops-config.git config-repo
          cd config-repo/deploy/kustomize/overlays/dev
          kustomize edit set image aneeswar/notes-app=aneeswar/notes-app:${{ steps.vars.outputs.sha_short }}
          git add .
          git commit -m "chore: update dev image to ${{ steps.vars.outputs.sha_short }}"
          git push

